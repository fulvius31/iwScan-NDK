plugins {
    // AGP 9 has built-in Kotlin support, so the kotlin-android plugin is not applied.
    id 'com.android.library' version '9.0.0'
    id 'maven-publish'
}

android {
    namespace 'sangiorgi.wps.scan'
    compileSdk = 36

    defaultConfig {
        minSdk 24
        consumerProguardFiles 'consumer-rules.pro'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }
    externalNativeBuild {
        cmake {
            path = file("src/main/cpp/CMakeLists.txt")
            version = "3.22.1"
        }
    }
    packaging {
        jniLibs {
            // libiwscan.so is an executable run from nativeLibDir; keep it on disk, uncompressed.
            useLegacyPackaging = true
        }
    }
    publishing {
        singleVariant('release') {
            withSourcesJar()
        }
    }
}

dependencies {
    // Root shell used to run the native scanner.
    implementation 'com.github.topjohnwu.libsu:core:6.0.0'
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.10.2'

    testImplementation 'junit:junit:4.13.2'
}

// Derive the published version from the git tag so it always matches the JitPack coordinate
// (JitPack checks out the tag before building). Falls back to "dev" for untagged local builds.
def libraryVersion = {
    try {
        def out = providers.exec {
            commandLine 'git', 'describe', '--tags', '--abbrev=0'
            ignoreExitValue = true
        }.standardOutput.asText.get().trim()
        out ? out : 'dev'
    } catch (ignored) {
        'dev'
    }
}()

// Maven coordinates: com.github.fulvius31:iwScan-NDK:<tag>
// Published to GitHub Packages by CI (.github/workflows/publish.yml); also JitPack-compatible.
afterEvaluate {
    publishing {
        publications {
            release(MavenPublication) {
                from components.release
                groupId = 'com.github.fulvius31'
                artifactId = 'iwScan-NDK'
                version = libraryVersion
            }
        }
        repositories {
            maven {
                name = 'GitHubPackages'
                url = uri('https://maven.pkg.github.com/fulvius31/iwScan-NDK')
                credentials {
                    username = System.getenv('GITHUB_ACTOR') ?: (project.findProperty('gpr.user') ?: '')
                    password = System.getenv('GITHUB_TOKEN') ?: (project.findProperty('gpr.token') ?: '')
                }
            }
        }
    }
}
