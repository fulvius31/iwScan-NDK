name: Publish

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'   # e.g. 1.0.0
  workflow_dispatch:             # allow manual runs from the Actions tab

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write            # required to publish to GitHub Packages
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0         # tags needed so the version derives from git describe

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK & CMake
        run: yes | sdkmanager "ndk;25.0.8775105" "cmake;3.22.1" > /dev/null

      - name: Build, test & publish to GitHub Packages
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease testDebugUnitTest publish --stacktrace
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
